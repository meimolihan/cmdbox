<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <meta name="description" content="页面未找到 - CmdBox命令大全">
    <title>404 - 页面未找到 | CmdBox 命令搜索引擎</title>
    <link rel="shortcut icon" href="img/favicon.ico">
    <link rel="stylesheet" type="text/css" href="css/index.css?v=8f59d4930678611b">
    <style>
      html[data-color-mode="light"] body {
        background-color: #f5f7fa !important;
      }
      html:not([data-color-mode]) body,
      html[data-color-mode="dark"] body {
        background-color: #0d1117 !important;
      }
    </style>
    <script src="js/dt.js?v=8f59d4930678611b"></script>
    <script src="js/index.js?v=8f59d4930678611b"></script>
</head>
<body>
<div id="theme-toggle" onclick="toggleTheme()" style="position:fixed;left:10px;bottom:40px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:999;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);border:none;overflow:hidden;"></div>
<script>
function toggleTheme(){var e=document.documentElement,t=document.getElementById('theme-toggle');'dark'===e.getAttribute('data-color-mode')?(e.setAttribute('data-color-mode','light'),localStorage.setItem('_dark_mode_theme_','light'),t.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)',t.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)'):(e.setAttribute('data-color-mode','dark'),localStorage.setItem('_dark_mode_theme_','dark'),t.style.background='linear-gradient(135deg, #58a6ff 0%, #79c0ff 100%)',t.style.boxShadow='0 4px 15px rgba(88, 166, 255, 0.4)')}
var _st=localStorage.getItem('_dark_mode_theme_'),_tt=document.getElementById('theme-toggle');if(_st==='dark'||_st===null){document.documentElement.setAttribute('data-color-mode','dark');_tt.style.background='linear-gradient(135deg, #58a6ff 0%, #79c0ff 100%)';_tt.style.boxShadow='0 4px 15px rgba(88, 166, 255, 0.4)'}else{_tt.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)';_tt.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)'}
</script>

<div class="page-404">
  <!-- ⑳ 404 页面 SVG 插图 -->
  <div class="error-illustration">
    <svg viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="terminal-404">
      <!-- 终端窗口 -->
      <rect x="20" y="30" width="200" height="140" rx="10" stroke="currentColor" stroke-width="2" fill="var(--color-card-bg, #161b22)" opacity="0.9"/>
      <!-- macOS 圆点 -->
      <circle cx="40" cy="50" r="6" fill="#ff5f57"/>
      <circle cx="60" cy="50" r="6" fill="#febc2e"/>
      <circle cx="80" cy="50" r="6" fill="#28c840"/>
      <!-- 终端内容 -->
      <text x="40" y="90" fill="currentColor" font-family="monospace" font-size="14" opacity="0.7">$ command --not-found</text>
      <text x="40" y="115" fill="#f85149" font-family="monospace" font-size="14">command not found: 404</text>
      <text x="40" y="140" fill="#8b949e" font-family="monospace" font-size="12">$ _</text>
      <!-- 闪烁光标 -->
      <rect x="40" y="128" width="8" height="16" fill="currentColor" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1s" repeatCount="indefinite"/>
      </rect>
      <!-- 装饰线条 -->
      <line x1="30" y1="70" x2="210" y2="70" stroke="currentColor" stroke-width="1" opacity="0.1"/>
    </svg>
  </div>
  <div class="error-code">404</div>
  <h1 class="error-title">页面未找到</h1>
  <p class="error-desc">抱歉，您访问的页面不存在或已被移除。试试搜索您需要的 CmdBox 命令。</p>
  <!-- ㉑ 404 搜索框 -->
  <div class="error-search">
    <input type="text" id="error-search-input" class="error-search-input" placeholder="搜索 CmdBox 命令..." autocomplete="off">
    <button id="error-search-btn" class="error-search-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      搜索
    </button>
  </div>
  <div class="error-actions">
    <a href="index.html" class="error-btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      返回首页
    </a>
    <a href="hot.html" class="error-btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" y1="19" x2="20" y2="19"></line>
      </svg>
      命令列表
    </a>
  </div>
</div>
<script>
// 404 搜索框功能
(function() {
  var input = document.getElementById('error-search-input');
  var btn = document.getElementById('error-search-btn');
  if (!input || !btn) return;
  var basePath = ''.replace(/\/$/, '');
  function doSearch() {
    var kw = (input.value || '').trim();
    if (kw) {
      window.location.href = basePath + '/list.html#!kw=' + encodeURIComponent(kw);
    }
  }
  btn.addEventListener('click', doSearch);
  input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doSearch();
  });
})();
</script>


</body>
</html>
